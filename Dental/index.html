<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#10b981" />
    <title>PureSmile | Modern Dentistry & Personalized Dental Care</title>
    <meta name="description" content="Experience premium dental care at PureSmile. We offer innovative technologies, pain-free treatments, and personalized care for adults and children in Los Angeles, NY, and Miami." />
    <meta name="keywords" content="dentist, modern dentistry, dental care, teeth whitening, pain-free dental, PureSmile, dental clinic" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://puresmile.com/" />
    <meta property="og:title" content="PureSmile | Modern Dentistry & Personalized Dental Care" />
    <meta property="og:description" content="Experience premium dental care at PureSmile. Innovative technologies and pain-free treatments." />
    <meta property="og:image" content="/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://puresmile.com/" />
    <meta property="twitter:title" content="PureSmile | Modern Dentistry & Personalized Dental Care" />
    <meta property="twitter:description" content="Experience premium dental care at PureSmile. Innovative technologies and pain-free treatments." />
    <meta property="twitter:image" content="/og-image.jpg" />

    <!-- Canonical Tag -->
    <link rel="canonical" href="https://puresmile.com/" />

    <!-- Performance: Preconnect to Font domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet" />
    </noscript>

    <!-- SEO: JSON-LD Structured Data for Local Business -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Dentist",
      "name": "RealSmile Dental Clinic",
      "image": "https://puresmile.com/og-image.jpg",
      "@id": "",
      "url": "https://puresmile.com",
      "telephone": "+111-22-234-5566",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "1 Kensington Lane",
        "addressLocality": "London",
        "postalCode": "W8 5EP",
        "addressCountry": "GB"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 51.5014,
        "longitude": -0.1910
      },
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": [
          "Monday",
          "Tuesday",
          "Wednesday",
          "Thursday",
          "Friday"
        ],
        "opens": "09:00",
        "closes": "18:00"
      },
      "sameAs": [
        "https://facebook.com/realsmile",
        "https://instagram.com/realsmile"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
